analysis:
  parallel: true
  max_diff_size_kb: 500

llm:
  temperature: 0.2
  max_tokens: 2000
  retry_attempts: 2

synthesis:
  enable_self_critique: true
  min_severity_to_report: low

output:
  default_format: markdown

context:
  # path: .pr-review-context.md   # or graphify-out/graph.json; omit to auto-discover
  budget_tokens: 1500              # max tokens of context injected per analysis pass
